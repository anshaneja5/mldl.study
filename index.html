<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ml-roadmap2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060713" />
    <title>mldl.study — Your Roadmap to AI Mastery</title>

    <!-- Typeface: Sora (display) · Hanken Grotesk (body) · JetBrains Mono (numerics) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Apply the theme before first paint to avoid a flash of the wrong color -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('darkMode');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = saved !== null ? saved === 'true' : prefersDark;
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.style.backgroundColor = isDark ? '#060713' : '#f6f7fb';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
